# Hyperparameters from Section 4.1 of the CLIP-KD paper
lr: 1.0e-3
beta1: 0.9
beta2: 0.98
eps: 1.0e-10 # According to Karpathy
weight_decay: 0.1
warmup_steps: 10000
epochs: 32
# Per-GPU batch size; total = batch_size * num_gpus (paper uses 1024 total on 8 GPUs)
batch_size: 256
# Accumulate gradients over N steps before an optimizer update.
# Effective batch = batch_size * num_gpus * accumulate_grad_batches.
# Set > 1 to reduce per-step peak VRAM without changing the effective batch size
# (lower batch_size proportionally when raising this).
accumulate_grad_batches: 1
eval_batch_size: 256
# Separate worker count for validation DataLoaders — keep low to avoid OOM
# when forking processes that each hold the full ImageNet Arrow dataset.
eval_workers: 8
# DALI equivalent of torch DataLoader's num_workers — uses threads, not forked processes.
# Heavy work (decode/augment) runs on the GPU, so fewer threads are needed.
dali_threads: 12
# DALI equivalent of torch DataLoader's prefetch_factor.
prefetch_queue_depth: 8
# PyTorch Lightning precision string
precision: "16-mixed"
# mask_ratio > 0 activates MFD (Masked Feature Distillation)
mask_ratio: 0.0
grad_clip_norm: 1.0
seed: 42
# Run zero-shot eval every N epochs (also controls check_val_every_n_epoch in Trainer)
zeroshot_frequency: 1
# Save a periodic checkpoint every N epochs (in addition to best-model checkpoints)
save_every_n_epochs: 5
# Do fast dev run (train and validate on a single batch) to check for bugs before launching full training
fast_dev_run: false
# Full checkpoint resume: restores model weights + optimizer + scheduler + epoch/step.
# Overrides student_checkpoint if both are set.
resume_ckpt: null