# Hyperparameters from Section 4.1 of the CLIP-KD paper
lr: 1.0e-3
beta1: 0.9
beta2: 0.98
eps: 1.0e-6
weight_decay: 0.1
warmup_steps: 10000
epochs: 32
# Per-GPU batch size; total = batch_size * num_gpus (paper uses 1024 total on 8 GPUs)
batch_size: 256
eval_batch_size: 256
workers: 8
# PyTorch Lightning precision string
precision: "bf16-mixed"
# mask_ratio > 0 activates MFD (Masked Feature Distillation)
mask_ratio: 0.0
grad_clip_norm: null
seed: 42
# Run zero-shot eval every N epochs
zeroshot_frequency: 2
