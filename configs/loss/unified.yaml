# Unified KD: FD + CRD + ICL (best combo from paper Section 4.3).
# GD and AFD are off by default due to compute cost.
#
# Paper weights from Section 4.1:
#   alpha_ckd  = 1    (CRD in paper)
#   alpha_fd   = 2000 (FD in paper; scale accounts for small embedding MSE values)
#   alpha_gd   = 1e8  (GD in paper; scale accounts for tiny gradient values)
#   alpha_icl  = 1    (ICL in paper)
alpha_task: 1.0
alpha_ckd: 1.0
alpha_icl: 1.0
alpha_fd: 2000.0
alpha_mfd: 0.0
alpha_gd: 0.0
alpha_afd: 0.0

gather_with_grad: false
local_loss: false
