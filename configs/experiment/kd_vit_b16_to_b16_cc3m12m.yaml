# @package _global_
# ViT-B/16 → ViT-B/16 self-distillation on CC3M + CC12M.
# Teacher: best public ViT-B/16 (laion2b_s34b_b88k), loaded automatically via open_clip.
#
# Variants (override via CLI):
#   Baseline (random text init, trainable):
#     python scripts/train.py +experiment=kd_vit_b16_to_b16_cc3m12m
#
#   Text encoder initialised from teacher, still trainable:
#     python scripts/train.py +experiment=kd_vit_b16_to_b16_cc3m12m \
#         model.init_student_text_from_teacher=true
#
#   Text encoder initialised from teacher and frozen:
#     python scripts/train.py +experiment=kd_vit_b16_to_b16_cc3m12m \
#         model.init_student_text_from_teacher=true \
#         model.freeze_student_text_encoder=true
defaults:
  - override /model: vit_base_16
  - override /loss: unified
  - override /dataset: cc3m_12m

exp_name: kd_vit_b16_to_b16_cc3m12m

# possible datasets: dfn2b, datacomp_xl_s13b_b90k
model:
  # dfn2b / datacomp_xl_s13b_b90k were trained with QuickGELU → use ViT-B-16-quickgelu
  # laion2b_s34b_b88k was trained with standard GELU → use ViT-B-16
  teacher_name: "ViT-B-16"
  teacher_pretrained: "dfn2b"               # best public ViT-B/16 on open_clip
  init_student_text_from_teacher: false       # set true to copy teacher text encoder → student
  freeze_student_text_encoder: false          # set true to keep student text encoder frozen

dataset:
  cc3m_root: ???
  cc3m_csv: ???
  cc12m_root: ???
  cc12m_csv: ???

training:
  epochs: 32
  batch_size: 128
  warmup_steps: 10000
