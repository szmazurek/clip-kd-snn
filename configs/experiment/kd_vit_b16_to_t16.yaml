# @package _global_
# ViT-B/16 → ViT-T/16 knowledge distillation on CC3M
# Unified loss: FD + CRD + ICL
defaults:
  - override /model: vit_tiny_16
  - override /loss: unified
  - override /dataset: cc3m

exp_name: kd_vit_b16_to_t16

model:
  teacher_checkpoint: /net/storage/pr3/plgrid/plggwie/plgmazurekagh/results_clip_kd/teacher_pretrained_vit_b_16/checkpoints/last.ckpt

dataset:
  train_root: /data/cc3m/images
  train_csv: /data/cc3m/train.tsv
  # Optional: uncomment to enable eval
  # imagenet_val_root: /data/imagenet/val
  # mscoco_root: /data/mscoco

training:
  epochs: 32
  batch_size: 256
  warmup_steps: 10000
