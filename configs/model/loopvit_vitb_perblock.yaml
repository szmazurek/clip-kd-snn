# LoopViT-ViT-B-16-perblock: fine-grained per-block loop schedule
# 3 transformer blocks: first and last are single-pass; middle block recurs 10x
# Execution: block0 (1x) → block1 (10x) → block2 (1x)  [total: 12 block applications]
# Text: ViT-B/16 (embed_dim=512); a linear projection maps visual 768 → 512
name: "LoopViT-ViT-B-16-perblock"
text_encoder_name: "ViT-B-16"

embed_dim: 768
num_heads: 12
loop_core_depth: 3          # must equal len(loop_schedule)
loop_mode: "per_block"
loop_schedule: [1, 10, 1]   # per-block step counts; block 1 is the recurrent core
mlp_ratio: 4.0
dropout: 0.0
add_step_embeddings: false   # must be false in per_block mode
use_exit_gate: false         # must be false in per_block mode
min_loop_steps: 1

pretrained: null
student_checkpoint: null  # path to a .pt state-dict; loads student weights only (fresh optimizer)

# Teacher fields (populated in experiment configs or via CLI override)
teacher_name: null
teacher_checkpoint: null
teacher_pretrained: null

# Student text encoder control
init_student_text_from_teacher: false
freeze_student_text_encoder: false

# torch.compile
compile: true
compile_mode: "reduce-overhead"
