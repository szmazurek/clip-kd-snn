# QKFormer image encoder (QKFormer_10_512, 512-dim) + ViT-B/16 text encoder (512-dim)
# No projection needed: visual and text spaces have the same dimension.
name: "QKFormer-ViT-B-16"
student_checkpoint: null
pretrained: null

# Text encoder used on the ANN side (open_clip model name, pretrained=None)
text_encoder_name: "ViT-B-16"

# Teacher fields (unused for baseline; populated in KD experiment configs)
teacher_name: null
teacher_checkpoint: null
teacher_pretrained: null

# Student text encoder control (not applicable to QKFormer; kept for schema compatibility)
init_student_text_from_teacher: false
freeze_student_text_encoder: false

compile: true              # compile ANN text encoder (ViT-B/16) with torch.compile
compile_snn: true         # compile SNN visual encoder — experimental, off by default
compile_snn_mode: "default"  # torch.compile mode for the SNN block

# SNN hyperparameters
snn:
  T: 2                # SNN simulation timesteps (input frame repeated T times)
  neuron_type: "lif"   # Neuron model: lif | sj_lif | plif | nlif | glif
  v_threshold: 1.0     # Spike threshold voltage
  tau: 2.0             # Membrane time constant
  backend: "torch"     # Computation backend: torch | triton | cupy
