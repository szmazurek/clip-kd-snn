defaults:
  - model: vit_tiny_16
  - dataset: cc3m
  - loss: clip_only
  - training: default
  - _self_

exp_name: run  # override per experiment (configs/experiment/) or via CLI

hydra:
  run:
    dir: outputs/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: outputs/multirun/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
