defaults:
  - model: vit_tiny_16
  - dataset: cc3m
  - loss: clip_only
  - training: default
  - _self_

exp_name: run          # override per experiment (configs/experiment/) or via CLI: exp_name=my_ablation
run_base_dir: outputs  # base dir for all runs; override via CLI: run_base_dir=/scratch/mydir

hydra:
  run:
    dir: ${run_base_dir}/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${run_base_dir}/multirun/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
