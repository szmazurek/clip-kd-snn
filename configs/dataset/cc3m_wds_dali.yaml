# CC3M WebDataset — DALI-accelerated pipeline
#
# Drop-in replacement for cc3m_wds.yaml.  The only difference is that image
# decoding, RandomResizedCrop and normalisation run entirely on the GPU via
# nvJPEG + DALI, eliminating the large HtoD memcpy that fragments the CUDA
# timeline.  Text tokenisation still runs on the CPU main process.
#
# Prereq:
#   pip install nvidia-dali-cuda<VERSION>   # match your CUDA toolkit version
#
# Shard layout (pixparse/cc3m-wds):
#   cc3m-train-{0000..0575}.tar  — 576 shards, 2,905,954 samples

type: "cc3m_wds_dali"

# Brace-expansion pattern understood by braceexpand (webdataset dependency).
shard_pattern: "${oc.env:SCRATCH}/.cache/hub/datasets--pixparse--cc3m-wds/snapshots/46f3d69f840e59d77d52e8decfe5baec97e94c7f/cc3m-train-{0000..0575}.tar"

# Total training samples.  Used to compute per-rank epoch length so Lightning
# reports correct steps-per-epoch and the LR scheduler steps correctly.
num_samples: 2905954

# DALI reader shuffle buffer depth (number of samples prefetched for random
# sampling).  Larger values improve randomness but consume more host memory.
shuffle_buffer: 5000

seed: 42

imagenet_hf_cache_dir: null
imagenet_val_root: null
imagenet_v2_root: null
imagenet_r_root: null
imagenet_sketch_root: null
mscoco_root: null
flickr30k_root: null
